[project]
name = "bub-weixin-channel"
version = "0.1.0"
description = "WeChat channel plugin for Bub framework"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "bub>=0.3.1",
    "weixin-agent-sdk @ git+https://github.com/iodone/weixin-agent-sdk",
]

[project.entry-points."bub"]
weixin_channel = "bub_weixin_channel.plugin:WeixinPlugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bub_weixin_channel"]

[tool.hatch.metadata]
allow-direct-references = true
