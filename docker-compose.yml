services:
  bub:
    build: .
    env_file: .env
    volumes:
      - ${BUB_WORKSPACE}:/workspace
      - ${BUB_SKILLS}:/root/.agents/skills
      - ${BUB_WEIXIN_DATA}:/root/.openclaw/openclaw-weixin
      - ${BUB_HOME}:/root/.bub
    # Required for boxsh sandbox (nested namespaces) inside Docker
    privileged: true
    restart: unless-stopped
